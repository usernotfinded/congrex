name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        # TODO: pin GitHub Actions to full commit SHAs after verifying exact upstream SHAs.
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        # TODO: pin GitHub Actions to full commit SHAs after verifying exact upstream SHAs.
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        # TODO: pin GitHub Actions to full commit SHAs after verifying exact upstream SHAs.
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust executor compiles for native target
        working-directory: congrex-executor
        run: cargo check --tests

      - name: Add Windows Rust target
        if: matrix.os == 'ubuntu-latest'
        run: rustup target add x86_64-pc-windows-msvc

      - name: Check Rust executor compiles for Windows target
        if: matrix.os == 'ubuntu-latest'
        working-directory: congrex-executor
        run: cargo check --tests --target x86_64-pc-windows-msvc

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Build Rust executor
        working-directory: congrex-executor
        run: cargo build

      - name: Test Rust executor
        working-directory: congrex-executor
        run: cargo test

      - name: Run Node tests
        run: npm test

      - name: Build project
        run: npm run build
